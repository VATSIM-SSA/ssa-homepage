name: Build & Deploy homepage

# main    -> builds ghcr :prod    -> deploys homepage-prod    (production environment)
# staging -> builds ghcr :staging -> deploys homepage-staging (staging environment)
on:
  push:
    branches: [main, staging]
    # Don't rebuild/redeploy for docs-only commits.
    paths-ignore:
      - "**.md"
      - "LICENSE"

# Never let two deploys of the same branch overlap.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # The environment gates which SSH key + branch policy applies:
    #   main -> production (locked to main), staging -> staging.
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target + tag
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "target=prod" >> "$GITHUB_OUTPUT"
          else
            echo "target=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vatsim-ssa/ssa-homepage:${{ steps.vars.outputs.target }}
            ghcr.io/vatsim-ssa/ssa-homepage:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH (forced-command key picks the target)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # The server's forced command ignores this and runs
          # deploy-homepage.sh <env> for whichever key this environment holds.
          script: ${{ steps.vars.outputs.target }}

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -sS -H "Content-Type: application/json" -X POST "${{ secrets.DISCORD_WEBHOOK }}" -d '{
            "username": "SSA Deploy",
            "embeds": [{
              "title": "❌ Homepage deploy failed — ${{ steps.vars.outputs.target }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "color": 15158332,
              "description": "Branch **${{ github.ref_name }}** · commit `${{ github.sha }}` by **${{ github.actor }}**\nClick the title for the failed run logs.",
              "footer": { "text": "ssa-homepage CI" }
            }]
          }'
